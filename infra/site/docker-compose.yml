name: podgoroy-site

services:
  podgoroy-remaster-app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: podgoroy-remaster:latest
    container_name: podgoroy-remaster-app
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      DIRECTUS_INTERNAL_URL: ${DIRECTUS_INTERNAL_URL:-http://host.docker.internal:8055}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3011:3000"
